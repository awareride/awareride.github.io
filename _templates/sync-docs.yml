name: Push Docs to Central Hub

on:
  push:
    branches: [ main ]
    paths: [ 'docs/**' ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Checkout Central Repo
        uses: actions/checkout@v4
        with:
          repository: awareride/awareride.github.io
          token: ${{ secrets.CENTRAL_HUB_TOKEN }}
          path: central

      - name: Sync docs
        run: |
          rm -rf central/src/content/docs/packscope
          cp -r docs central/src/content/docs/packscope
          cd central
          git config user.email 'syncbot@awareride.com'
          git config user.name 'DocSyncBot'
          git add src/content/docs/packscope
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: sync from ${{ github.event.repository.name }}"
            git push
          fi
